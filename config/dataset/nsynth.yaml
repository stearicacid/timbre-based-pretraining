# NSynth TFDS source configuration.
name: nsynth/full:2.3.3

# Optional TFDS data directory. Null uses the default TFDS location.
data_dir: ${paths.tfds_data_dir}

# Limit number of examples processed per run. Null means no limit.
max_samples: null

# Audio/data timing defaults expected by DDSP extraction.
sample_rate: 16000
frame_rate: 250

# Keep labels needed by downstream timbre tasks.
include_note_labels: true